services:
  app:
    image: steel-process-card-app:latest
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: steel-process-card-app
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "80:3001"

  postgres:
    image: postgres:16
    container_name: steel-process-card-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: process_card
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ProcessCard2026
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
      - ./docker-backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d process_card"]
      interval: 10s
      timeout: 5s
      retries: 10
